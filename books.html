<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essential Books on Urban Heat Islands</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f3ee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .book-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
        }
        .cover-image {
            transition: transform 0.5s ease;
            filter: drop-shadow(4px 4px 6px rgba(0,0,0,0.2));
        }
        .book-card:hover .cover-image {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="pb-20">

    <div class="bg-green-900 text-white pt-16 pb-24 px-4 text-center shadow-lg rounded-b-[3rem]">
        <h1 class="text-5xl font-extrabold mb-4">Reading Suggestions</h1>
        <p class="text-xl text-green-200 max-w-2xl mx-auto">Essential reading on the Urban Heat Island effect, sustainable architecture, and climate-resilient cities.</p>
    </div>

    <div class="max-w-7xl mx-auto px-4 -mt-12">
        <div id="book-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </div>

    <script>
        // Data Array for the Real Books with REAL ISBNs
        const bookData = [
            { title: "Heat Wave: A Social Autopsy", author: "Eric Klinenberg", isbn: "9780226443225" },
            { title: "Sustainable Urbanism", author: "Douglas Farr", isbn: "9780471777519" },
            { title: "Urban Climates", author: "T. R. Oke", isbn: "9780521278420" },
            { title: "Drawdown", author: "Paul Hawken", isbn: "9780143130444" },
            { title: "Biophilic Cities", author: "Timothy Beatley", isbn: "9781597267151" },
            { title: "Climate Resilient Cities", author: "Neeraj Prasad", isbn: "9780821377666" },
            { title: "The Death and Life of Great American Cities", author: "Jane Jacobs", isbn: "9780679741954" },
            { title: "Street Science", author: "Jason Corburn", isbn: "9780262532720" },
            { title: "The Sustainable City", author: "Steven Cohen", isbn: "9780231182058" },
            { title: "Green Urbanism", author: "Timothy Beatley", isbn: "9781559636827" },
            { title: "Palaces for the People", author: "Eric Klinenberg", isbn: "9781524761165" },
            { title: "Building a Sustainable Home", author: "Melissa R. Schifman", isbn: "9781510733220" }
        ];

        const grid = document.getElementById('book-grid');

        bookData.forEach(book => {
            const coverUrl = `https://covers.openlibrary.org/b/isbn/${book.isbn}-L.jpg?default=false`;
            const authorAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(book.author)}&background=random&color=fff&size=64`;

            // UPDATED: The onerror event now removes the '.book-card' entirely if the image fails or returns a 404.
            const cardHTML = `
                <div class="book-card rounded-2xl shadow-lg overflow-hidden border border-gray-200 flex flex-col cursor-pointer pb-2">
                    
                    <div class="h-64 w-full bg-gray-100 flex items-center justify-center p-4">
                        <img src="${coverUrl}" alt="Cover of ${book.title}" 
                             class="cover-image max-h-full max-w-full object-contain"
                             onerror="this.closest('.book-card').remove();">
                    </div>
                    
                    <div class="p-5 flex-grow flex flex-col justify-between bg-white">
                        <h3 class="font-bold text-lg text-gray-900 leading-tight mb-4">${book.title}</h3>
                        
                        <div class="flex items-center gap-3 mt-auto pt-4 border-t border-gray-100">
                            <img src="${authorAvatar}" alt="${book.author}" class="w-8 h-8 rounded-full shadow-sm border border-gray-300">
                            <span class="text-sm font-semibold text-gray-600">${book.author}</span>
                        </div>
                    </div>

                </div>
            `;
            grid.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
